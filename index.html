<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse - Free Streaming</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Cairo for Arabic, Inter for English) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons for Ultra Modern Look -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white font-['Inter'] antialiased overflow-x-hidden">

    <!-- TOP NAVIGATION & SEARCH -->
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-md border-b border-zinc-800 px-4 lg:px-8 py-4 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <!-- Logo & Lang Toggle -->
            <div class="flex items-center justify-between w-full md:w-auto gap-6">
                <a href="index.html" class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-amber-400">CINEVERSE</a>
                
                <div class="flex items-center gap-4">
                    <button id="langToggle" class="flex items-center gap-1 bg-zinc-900 border border-zinc-700 px-3 py-1.5 rounded-full text-sm font-semibold hover:bg-orange-500 hover:text-black transition duration-300">
                        <i data-lucide="globe" class="w-4 h-4"></i>
                        <span id="langText">العربية</span>
                    </button>
                </div>
            </div>

            <!-- Enhanced Search Bar -->
            <div class="relative w-full md:w-96 group">
                <input type="text" id="searchBar" data-i18n-placeholder="searchPlaceholder" placeholder="Search movies, series, anime..." class="w-full bg-zinc-900/80 border border-zinc-700 rounded-full px-5 py-2.5 pl-12 text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-300">
                <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-zinc-400 group-focus-within:text-orange-500 transition-colors"></i>
            </div>

            <!-- Auth Actions -->
            <div id="authArea" class="flex items-center gap-4">
                <!-- Will be dynamically filled by JS (Login button or User Profile) -->
            </div>
        </div>
    </header>

    <!-- CATEGORIES NAVBAR -->
    <nav class="bg-zinc-900/50 border-b border-zinc-800/80 px-4 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <div class="max-w-7xl mx-auto flex justify-start md:justify-center items-center gap-8 py-3.5 text-sm font-medium tracking-wide text-zinc-400">
            <a href="#" class="hover:text-orange-500 transition duration-200 active-nav flex items-center gap-1" data-i18n="navHome">Home</a>
            <a href="#" class="hover:text-orange-500 transition duration-200" data-i18n="navMovies">Movies</a>
            <a href="#" class="hover:text-orange-500 transition duration-200" data-i18n="navSeries">Western Series</a>
            <a href="#" class="hover:text-orange-500 transition duration-200" data-i18n="navTurkishDrama">Turkish Drama</a>
            <a href="#" class="hover:text-orange-500 transition duration-200" data-i18n="navAnime">Anime</a>
            <a href="#" class="hover:text-orange-500 transition duration-200" data-i18n="navTurkishSeries">Turkish Series</a>
        </div>
    </nav>

    <!-- MAIN HERO & CONTENT -->
    <main class="max-w-7xl mx-auto px-4 lg:px-8 py-8 space-y-12">

        <!-- DYNAMIC CONTINUE WATCHING SECTION (Hidden by default, shown if logged in) -->
        <section id="continueWatchingSection" class="hidden space-y-4">
            <h2 class="text-2xl font-bold tracking-tight flex items-center gap-2 text-orange-500">
                <i data-lucide="play-circle" class="w-6 h-6 animate-pulse"></i>
                <span data-i18n="continueWatching">Continue Watching</span>
            </h2>
            <div id="continueWatchingGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <!-- Cards injected dynamically via script.js -->
            </div>
        </section>

        <!-- TRENDING MOVIES -->
        <section class="space-y-4">
            <h2 class="text-2xl font-bold tracking-tight flex items-center gap-2 border-l-4 border-orange-500 pl-3 setup-rtl-border" data-i18n="trendingMovies">Trending Movies</h2>
            <div id="trendingMoviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>

        <!-- TRENDING SERIES -->
        <section class="space-y-4">
            <h2 class="text-2xl font-bold tracking-tight flex items-center gap-2 border-l-4 border-orange-500 pl-3 setup-rtl-border" data-i18n="trendingSeries">Trending Series</h2>
            <div id="trendingSeriesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>

        <!-- TRENDING ANIME -->
        <section class="space-y-4">
            <h2 class="text-2xl font-bold tracking-tight flex items-center gap-2 border-l-4 border-orange-500 pl-3 setup-rtl-border" data-i18n="trendingAnime">Trending Anime</h2>
            <div id="trendingAnimeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <!-- ULTRA MODERN MODAL / CARD VIEW (Quick Info) -->
    <div id="infoModal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-2xl w-full overflow-hidden relative shadow-2xl shadow-orange-500/5 transform scale-95 transition-transform duration-300">
            <button id="closeModal" class="absolute top-4 right-4 z-10 bg-black/60 p-2 rounded-full hover:bg-orange-500 hover:text-black transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="relative h-64 sm:h-80 w-full bg-cover bg-center" id="modalHeroBg">
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-zinc-900/40 to-black/20"></div>
                <div class="absolute bottom-6 left-6 right-6">
                    <span id="modalCategory" class="text-xs font-bold uppercase tracking-widest bg-orange-500 text-black px-2.5 py-1 rounded-md">Movie</span>
                    <h3 id="modalTitle" class="text-3xl font-black mt-2 tracking-tight">Content Title</h3>
                </div>
            </div>
            <div class="p-6 space-y-6">
                <p id="modalDesc" class="text-zinc-400 text-sm leading-relaxed">Description goes here...</p>
                <div class="flex items-center justify-between">
                    <div class="flex gap-4 text-xs text-zinc-500">
                        <span id="modalYear">2026</span>
                        <span id="modalDuration">2h 15m</span>
                    </div>
                    <button id="modalPlayBtn" class="flex items-center gap-2 bg-white text-black px-6 py-3 rounded-full font-bold hover:bg-orange-500 hover:text-black transition duration-300 shadow-lg transform hover:-translate-y-0.5">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                        <span data-i18n="watchNow">Watch Now</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md w-full p-8 relative shadow-2xl">
            <button id="closeLoginModal" class="absolute top-4 right-4 text-zinc-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h3 class="text-2xl font-bold mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-amber-400" data-i18n="loginTitle">Sign In</h3>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-zinc-400 block mb-1" data-i18n="usernameLabel">Username</label>
                    <input type="text" id="usernameInput" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-orange-500 text-white">
                </div>
                <div>
                    <label class="text-xs font-semibold text-zinc-400 block mb-1" data-i18n="passwordLabel">Password</label>
                    <input type="password" id="passwordInput" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-orange-500 text-white">
                </div>
                <p id="loginError" class="text-red-500 text-xs hidden" data-i18n="loginError">Invalid credentials!</p>
                <button type="submit" class="w-full bg-orange-500 text-black py-3 rounded-xl font-bold hover:bg-orange-600 transition duration-300 mt-2" data-i18n="loginBtn">Sign In</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
